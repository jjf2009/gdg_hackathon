name: gdg_hackathon
description: "CropDoc - Hyper-Local AI Crop Disease Advisor"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  percent_indicator: ^4.2.5
  image_picker: ^1.1.2
  flutter_tts: ^4.2.0
  tflite_flutter: ^0.11.0
  image: ^4.5.3
  url_launcher: ^6.3.1
  # Voice interface dependencies
  speech_to_text: ^7.3.0
  flutter_dotenv: ^5.2.1
  shared_preferences: ^2.5.5
  connectivity_plus: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/model/
    - assets/lang/
    - .env

  fonts:
    - family: Outfit
      fonts:
        - asset: assets/fonts/Outfit-Regular.ttf
          weight: 400
        - asset: assets/fonts/Outfit-Medium.ttf
          weight: 500
        - asset: assets/fonts/Outfit-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Outfit-Bold.ttf
          weight: 700
